<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AgingOS Console – Events</title>
  <style>
  /* THEME_TOKENS_V1 (source: proposals.html) */
  :root{
    --bg:#0b0f14;
    --fg:#e6edf3;
    --muted:#9fb0c0;
    --link:#7ee787;
    --card:#0f1620;
    --border:#1f2a37;
    --border2:#30363d;
    --shadow:0 8px 20px rgba(0,0,0,0.25);
    --primary:#1f6feb;
    --secondary:#30363d;
    --ok:#238636;
    --deg:#d29922;
    --err:#da3633;
  }

  body{
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 16px;
    max-width: 1400px;
    background: var(--bg);
    color: var(--fg);
  }
  /* Center wide layouts */
  @media (min-width: 900px){
    body{ margin-left:auto; margin-right:auto; }
  }

  a{ color: var(--link); }
  .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  @media (max-width: 980px){ .grid2{ grid-template-columns: 1fr; } }

  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: var(--shadow);
  }
  .muted{ color: var(--muted); font-size: 14px; }

  .pill{
    display:inline-block;
    padding:2px 8px;
    border-radius:999px;
    border:1px solid var(--border2);
    background: rgba(255,255,255,0.06);
    font-size:12px;
  }

  button{
    background: var(--primary);
    color: white;
    border: 0;
    padding: 8px 10px;
    border-radius: 12px;
    cursor: pointer;
  }
  button.secondary{ background: var(--secondary); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }

  input, select{
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 6px 8px;
  }

  table{ width:100%; border-collapse: collapse; }
  th, td{ padding:8px; border-bottom: 1px solid var(--border); vertical-align: top; text-align:left; }
  th{ color: var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.02em; background: transparent; }

  pre{
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 12px;
    overflow:auto;
  }

  .notice{
    margin: 8px 0 12px;
    padding: 10px 12px;
    border:1px solid rgba(210,153,34,0.55);
    background: rgba(210,153,34,0.10);
    border-radius: 12px;
    font-size: 13px;
    display:none;
    color: var(--fg);
  }

  /* Make the Step-8 topbar match proposals theme */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin:0 0 12px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:12px;
    background: var(--card);
    box-shadow: var(--shadow);
  }
  .topbar-title{ font-weight:700; color: var(--fg); }
  .nav{ margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; font-size:13px; }
  .navlink{ color: var(--link); text-decoration:none; }
  .navlink.active{ font-weight:700; text-decoration:underline; }
  .topbar-right{ display:flex; align-items:center; gap:8px; font-size:12px; color: var(--muted); flex-wrap:wrap; justify-content:flex-end; }
  @media (max-width: 900px){ .topbar{flex-direction:column;align-items:stretch} .topbar-right{justify-content:flex-start} }

  /* Common chips (anomalies/report) */
  .statuschip{
    display:inline-flex;
    gap:6px;
    align-items:center;
    padding:6px 10px;
    border:1px solid var(--border);
    border-radius:999px;
    background: rgba(255,255,255,0.04);
    font-size:13px;
  }

  /* Report warnbox */
  .warnbox{
    margin-top:10px;
    padding:8px 10px;
    border:1px solid rgba(210,153,34,0.55);
    background: rgba(210,153,34,0.10);
    border-radius: 12px;
    font-size:12px;
  }

  <script>
  function getStreamId() {
    try { return String(localStorage.getItem("agingos_stream_id") || "prod").trim() || "prod"; }
    catch (e) { return "prod"; }
  }
  function setStreamId(v) {
    v = String(v || "prod").trim() || "prod";
    localStorage.setItem("agingos_stream_id", v);
    return v;
  }
  function eventsUrl(qs) {
    const s = encodeURIComponent(getStreamId());
    const q = (qs || "").toString();
    return "/events?" + q + (q.includes("stream_id=") ? "" : ("&stream_id=" + s));
  }

      // TOPBAR_API_MINI v1

      // EVENTS_NOTICE_V1
      function _eventsUpdateNotice() {
        const el = document.getElementById("globalNotice");
        if (!el) return;
        const key = String(getApiKey() || "").trim();
        if (!key) {
          el.style.display = "block";
          el.textContent = "Mangler X-API-Key. Sett nøkkel på Status-siden (index.html) og last siden på nytt.";
          return;
        }
        el.style.display = "none";
        el.textContent = "";
      }

      function _topbarUpdateApiMini() {
        const el = document.getElementById("apiMini");
        if (!el) return;
        const base = getApiBase();
        const key  = String(getApiKey() || "").trim();
        el.textContent = "API: " + base + " | key: " + (key ? "SET" : "NOT SET");
      }
      (function(){
        try { _topbarUpdateApiMini(); } catch(e) {}
        try { _eventsUpdateNotice(); } catch(e) {}
        window.addEventListener("storage", (ev) => {
          const k = ev && ev.key ? String(ev.key) : "";
          if (!k) return;
          if (k.startsWith("agingos_api_") || k === "apiBase" || k === "apiKey") {
            try { _topbarUpdateApiMini(); } catch(e) {}
          }
        });
        setTimeout(() => { try { _topbarUpdateApiMini(); } catch(e) {} }, 0);
      })();

    function getQS() {
      const p = new URLSearchParams(window.location.search);
      return {
        since: p.get("since"),
        until: p.get("until"),
        category: p.get("category"),
        room: p.get("room"),
        auto: p.get("auto"),
      };

    }
    const $ = (id) => document.getElementById(id);

    let state = {
      since: null,
      until: null,
      category: "",
      room: "",
      limit: 1000,
      before: null,   // timestamp cursor (fetch older than this)
      rows: [],
      categories: [],
      exhausted: false,
        roomDupes: {},
        roomLastSeen: {},
        roomCounts: {},
        _isDupeById: {},
        _dupeLastTsByHash: {},
        _dupeMetaById: {},
        dupeStats: { total:0, dupes:0 },
        dupOnly: false,
        dupeWindowSec: 3,
    };

    function getApiBase() {
      let v =
        localStorage.getItem("agingos_api_base") ||
        localStorage.getItem("apiBase") ||
        "/api";
      v = String(v || "/api").trim();
      if (v.length > 1 && v.endsWith("/")) v = v.slice(0, -1);
      return v;
    }

    function getApiKey() {
      return (
        localStorage.getItem("agingos_api_key") ||
        localStorage.getItem("apiKey") ||
        ""
      );
    }

    function apiInfoText() {
      const base = getApiBase();
      const key = String(getApiKey() || "").trim();
      return "API base: " + base + " | API key: " + (key ? "satt" : "IKKE satt");
    }

    function renderApiMini(){
      const el = document.getElementById("apiMini");
      if (!el) return;
      el.textContent = "API: " + base + " | key: " + (key ? "SET" : "—");
    }

    async function apiGet(path) {
      const headers = {};
      const key = String(getApiKey() || "").trim();
      if (key) headers["X-API-Key"] = key;

      const base = getApiBase();
      const pth = String(path || "");
      const url = base + (pth.startsWith("/") ? pth : ("/" + pth));

      const res = await fetch(url, { headers });
      const text = await res.text();
      if (!res.ok) throw new Error(res.status + " " + text);
      return JSON.parse(text);
    }

    function isoUTC(d) {
      return d.toISOString().replace(".000Z", "Z");
    }

    function computeRange(preset) {
      const now = new Date();
      let since = new Date(now);
      if (preset === "24h") since.setHours(since.getHours() - 24);
      if (preset === "7d") since.setDate(since.getDate() - 7);
      if (preset === "14d") since.setDate(since.getDate() - 14);
      if (preset === "30d") since.setDate(since.getDate() - 30);
      return { since: isoUTC(since), until: isoUTC(now) };
    }



      function fmtUtc(iso) {
        if (!iso) return "";
        const t = String(iso).replace("Z","").replace("T"," ");
        return t.length >= 16 ? t.slice(0,16) : t;
      }

      function getRoomLabel(ev) {
        const p = (ev && ev.payload) ? ev.payload : {};
        const r = String((p && (p.room || p.area)) || "").trim();
        return r ? r : "ukjent rom";
      }

      // Deterministisk stringify: sorterer keys rekursivt
      function stableStringify(x) {
        if (x === null || x === undefined) return "null";
        const t = typeof x;
        if (t !== "object") return JSON.stringify(x);
        if (Array.isArray(x)) return "[" + x.map(stableStringify).join(",") + "]";
        const keys = Object.keys(x).sort();
        const parts = [];
        for (const k of keys) {
          parts.push(JSON.stringify(k) + ":" + stableStringify(x[k]));
        }
        return "{" + parts.join(",") + "}";
      }

      // Lett deterministisk hash (FNV-1a 32-bit) -> hex
      function hash32Hex(str) {
        let h = 0x811c9dc5;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
        }
        return ("00000000" + h.toString(16)).slice(-8);
      }

      function loadEventsUiPrefs() {
        const k = "agingos_events_dupe_window_sec";
        const v = localStorage.getItem(k);
        const sec = v ? parseInt(v, 10) : parseInt($("dupeWindow").value || "3", 10);
        state.dupeWindowSec = Number.isFinite(sec) && sec > 0 ? sec : 3;
        $("dupeWindow").value = String(state.dupeWindowSec);

        const k2 = "agingos_events_dup_only";
        const v2 = localStorage.getItem(k2);
        state.dupOnly = (v2 === "1");
        $("dupOnly").checked = state.dupOnly;
      }

      function resetDedupeState() {
        state.dupeStats = { total:0, dupes:0 };
        state._dupeLastTsByHash = {};
        state._isDupeById = {};
          state._dupeMetaById = {};
        state.roomCounts = {};
        state.roomLastSeen = {};
        state.roomDupes = {};
      }

      function upsertRoomOptionsFromRows(rows) {
        const sel = $("roomSel");
        if (!sel) return;
        const cur = String(sel.value || "");
        const setRooms = new Set();
        for (const ev of (rows || [])) setRooms.add(getRoomLabel(ev));
        const rooms = Array.from(setRooms);
        rooms.sort((a,b) => {
          if (a === "ukjent rom" && b !== "ukjent rom") return -1;
          if (b === "ukjent rom" && a !== "ukjent rom") return 1;
          return a.localeCompare(b);
        });

        sel.innerHTML = "";
        const optAll = document.createElement("option");
        optAll.value = "";
        optAll.textContent = "(alle)";
        sel.appendChild(optAll);
        for (const r of rooms) {
          const o = document.createElement("option");
          o.value = r;
          o.textContent = r;
          sel.appendChild(o);
        }
        if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
      }

      function renderRoomSummary() {
        const wrap = $("roomSummary");
        const body = $("roomSummaryBody");
        const meta = $("roomSummaryMeta");
        if (!wrap || !body || !meta) return;

        const rows = state.rows || [];
        if (rows.length === 0) { wrap.style.display = "none"; return; }

        const entries = [];
        for (const room of Object.keys(state.roomCounts || {})) {
          const count = state.roomCounts[room] || 0;
          const lastSeen = state.roomLastSeen[room] || "";
          const dupes = state.roomDupes[room] || 0;
          entries.push({ room, count, lastSeen, dupes });
        }
        entries.sort((a,b) => (b.count - a.count) || a.room.localeCompare(b.room));

        body.innerHTML = "";
        for (const it of entries) {
          const tr = document.createElement("tr");
          const tdR = document.createElement("td");
          const tdC = document.createElement("td");
          const tdL = document.createElement("td");
          const tdD = document.createElement("td");
          tdR.textContent = it.room;
          tdC.textContent = String(it.count);
          tdL.textContent = fmtUtc(it.lastSeen);
          const pct = it.count > 0 ? Math.round((it.dupes / it.count) * 100) : 0;
          tdD.textContent = `${pct}% (${it.dupes})`;
          tr.appendChild(tdR); tr.appendChild(tdC); tr.appendChild(tdL); tr.appendChild(tdD);
          body.appendChild(tr);
        }

        meta.textContent = `Dupe-vindu: ${state.dupeWindowSec}s | Totalt lastet: ${rows.length} | Dupe(view): ${state.dupeStats.dupes}/${state.dupeStats.total}`;
        wrap.style.display = "block";
      }

      function wireEventsUiPrefs() {
        $("dupeWindow").addEventListener("change", () => {
          const sec = parseInt($("dupeWindow").value || "3", 10);
          state.dupeWindowSec = Number.isFinite(sec) && sec > 0 ? sec : 3;
          localStorage.setItem("agingos_events_dupe_window_sec", String(state.dupeWindowSec));
          try { renderApiMini(); } catch (_) {}
      loadFresh();
        });

        $("dupOnly").addEventListener("change", () => {
          state.dupOnly = !!$("dupOnly").checked;
          localStorage.setItem("agingos_events_dup_only", state.dupOnly ? "1" : "0");
          loadFresh();
        });

        $("roomSel").addEventListener("change", () => {
          state.room = String($("roomSel").value || "").trim();
          resetTable();
          resetDedupeState();
          renderAppend(state.rows || []);
          renderRoomSummary();
        });
      }
    
    function renderAppend(events) {
      const windowSec = Number(state.dupeWindowSec || 3);

      const roomFilter = String(state.room || "").trim();
      if (roomFilter) {
        events = events.filter(ev => getRoomLabel(ev) === roomFilter);
      }

      if (state.categories && state.categories.length > 0) {
        events = events.filter(ev => state.categories.includes(String(ev.category || "").toLowerCase()));
      }

      if (events.length === 0) return;
      const tbody = $("tbody");

      for (const ev of events) {
        const room = getRoomLabel(ev);
        const cat = String(ev.category || "");
        const payload = (ev && ev.payload) ? ev.payload : {};

        const sig = room + "|" + cat + "|" + stableStringify(payload);
        const h = hash32Hex(sig);

        const ts = String(ev.timestamp || "");
        const id = String(ev.id || "");
        let isDupe = false;


          let prevTs = null;
        if (ts) {
            prevTs = state._dupeLastTsByHash[h] || null;
            let dtSec = null;
          if (prevTs) {
            try {
              const dt = (Date.parse(prevTs) - Date.parse(ts)) / 1000.0;
                if (Number.isFinite(dt)) dtSec = dt;
              if (Number.isFinite(dt) && dt >= 0 && dt <= windowSec) isDupe = true;
            } catch (_) {}
          }
          state._dupeLastTsByHash[h] = ts;
        }

        state._isDupeById[id] = isDupe;

          // store dupe meta for explainability
          state._dupeMetaById[id] = { hash: h, prevTs: prevTs || null, ts: ts || null, dtSec: (typeof dtSec === "number" ? dtSec : null) };

        if (state.dupOnly && !isDupe) continue;

        state.dupeStats.total += 1;
        if (isDupe) state.dupeStats.dupes += 1;

        // room aggregations (for summary)
        state.roomCounts[room] = (state.roomCounts[room] || 0) + 1;
        if (!state.roomLastSeen[room] || (ts && ts > state.roomLastSeen[room])) state.roomLastSeen[room] = ts;
        if (isDupe) state.roomDupes[room] = (state.roomDupes[room] || 0) + 1;

        const tr = document.createElement("tr");
        const tdT = document.createElement("td");
        const tdR = document.createElement("td");
        const tdC = document.createElement("td");
        const tdD = document.createElement("td");
        const tdI = document.createElement("td");
        const tdP = document.createElement("td");

        tdT.textContent = fmtUtc(ts);
        tdR.textContent = room;
        tdC.textContent = cat;

        if (isDupe) {
          const meta = state._dupeMetaById[id] || { hash: h, prevTs: null, ts: ts, dtSec: null };
            const dts = (typeof meta.dtSec === "number") ? Math.round(meta.dtSec) : null;
            const tip = `hash=${meta.hash}\nprev=${meta.prevTs || "?"}\nnow=${meta.ts || "?"}\nΔs=${(dts===null?"?":dts)}`;
            tdD.innerHTML = `<code title="${tip}">DUPE</code> <span class="muted">(${meta.hash})${(dts===null?"":(" Δ"+dts+"s"))}</span>`;
        } else {
          tdD.innerHTML = `<span class="muted">—</span>`;
        }

        tdI.innerHTML = `<code>${id.slice(0, 16)}…</code>`;
        tdP.innerHTML = `<code>${JSON.stringify(payload || {}, null, 0)}</code>`;

        tr.appendChild(tdT);
        tr.appendChild(tdR);
        tr.appendChild(tdC);
        tr.appendChild(tdD);
        tr.appendChild(tdI);
        tr.appendChild(tdP);
        tbody.appendChild(tr);
      }

      $("tbl").style.display = "table";
    }


    function resetTable() {
      $("tbody").innerHTML = "";
      $("tbl").style.display = "none";
    }

    function updateButtons() {
      $("moreBtn").disabled = state.exhausted || state.rows.length === 0;
    }

    async function fetchPage(isMore) {
      $("status").textContent = (isMore ? "Laster mer..." : "Laster...") + " — " + apiInfoText();
      const qs = new URLSearchParams();
      qs.set("since", state.since);
      qs.set("until", state.until);
      qs.set("limit", String(state.limit));
      if (state.categories.length === 1) qs.set("category", state.categories[0]);
      if (state.before) qs.set("before", state.before);

      const data = await apiGet(eventsUrl(qs.toString()));
      return data;
    }

    async function loadFresh() {
      resetTable();

      
      loadEventsUiPrefs();
      resetDedupeState();
const qs = getQS();

      // Auto-fetch when deep-linking (auto=1 + since/until) - run once per tab
      try {
        const k = "agingos_events_autofetch_done";
        if (qs.auto === "1" && qs.since && qs.until && sessionStorage.getItem(k) !== "1") {
          sessionStorage.setItem(k, "1");
          setTimeout(() => {
            const btn = document.getElementById("loadBtn");
            if (btn) btn.click();
          }, 50);
        }
      } catch (_) {}


      if (qs.since && qs.until) {
        state.since = qs.since;
        state.until = qs.until;
      } else {
        const preset = $("preset").value;
        const range = computeRange(preset);
        state.since = range.since;
        state.until = range.until;
      }
      state.category = (qs.category || $("category").value.trim());
      state.limit = parseInt($("limit").value, 10);
      state.before = null;
      state.rows = [];
      state.exhausted = false;
      state.room = String((qs.room || $("roomSel").value || "")).trim();
state.categories = state.category
        ? state.category.split(",").map(s => s.trim().toLowerCase()).filter(Boolean)
        : [];

      try {
        const page = await fetchPage(false);
        state.rows = page;
        renderAppend(page);

        
          upsertRoomOptionsFromRows(state.rows);
          renderRoomSummary();
// update cursor: last item is oldest in this page (descending order)
        if (page.length > 0) state.before = page[page.length - 1].timestamp;
        if (page.length < state.limit) state.exhausted = true;

        $("status").textContent = apiInfoText() + " — " + `Fant ${state.rows.length} events (viser siste). Periode: ${state.since} → ${state.until}` +
          (state.exhausted ? " (ingen flere)" : " (trykk 'Hent flere' for eldre)");
      } catch (e) {
          $("status").textContent = apiInfoText() + " — Feil: " + (e.message || String(e));
      }

      updateButtons();
    }

    async function loadMore() {
      if (state.exhausted) return;
      try {
        const page = await fetchPage(true);
        if (page.length === 0) {
          state.exhausted = true;
          updateButtons();
          $("status").textContent = `Fant ${state.rows.length} events. (ingen flere)`;
          return;
        }

        state.rows = state.rows.concat(page);
        renderAppend(page);

        
          upsertRoomOptionsFromRows(state.rows);
          renderRoomSummary();
state.before = page[page.length - 1].timestamp;
        if (page.length < state.limit) state.exhausted = true;

        $("status").textContent = apiInfoText() + " — " + `Fant ${state.rows.length} events. Periode: ${state.since} → ${state.until}` +
          (state.exhausted ? " (ingen flere)" : " (trykk 'Hent flere' for eldre)");
      } catch (e) {
        $("status").textContent = apiInfoText() + " — Feil: " + e.message;
      }

      updateButtons();
    }

    function clearAll() {
      resetTable();
      state = { since:null, until:null, category:"", room:"", limit:1000, before:null, rows:[], categories:[], exhausted:false, dupeWindowSec:3, dupOnly:false, dupeStats:{ total:0, dupes:0 }, _dupeLastTsByHash:{}, _isDupeById:{}, roomCounts:{}, roomLastSeen:{}, roomDupes:{} };
      $("status").textContent = "";
      updateButtons();
    }

    $("loadBtn").addEventListener("click", loadFresh);
    $("moreBtn").addEventListener("click", loadMore);
    $("clearBtn").addEventListener("click", clearAll);

    loadEventsUiPrefs();
    wireEventsUiPrefs();
    loadFresh();
    updateButtons();

  document.addEventListener("DOMContentLoaded", () => {
    const el = document.getElementById("stream_id");
    if (!el) return;
    el.value = getStreamId();
    el.addEventListener("change", () => {
      setStreamId(el.value);
      // trigger reload if function exists
      try { if (typeof reload === "function") reload(); } catch (e) {}
      try { if (typeof hent === "function") hent(); } catch (e) {}
    });
  });

</script>
</body>
</html>
