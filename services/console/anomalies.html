<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mulige avvik</title><link rel="stylesheet" href="./console_shared.css"></head><body><div class="wrap"><div id="shell"></div><div id="app"></div></div><script src="./console_shared.js"></script><script>
pageShell('anomalies.html','Mulige avvik');const app=document.getElementById('app');
function diffLabel(s){if(s>=0.75)return 'Stor';if(s>=0.4)return 'Tydelig';return 'Liten'}
(async()=>{const cache=loadCache('anomalies');let eps=[],devs=[];try{[eps,devs]=await Promise.all([api('/v1/anomalies?last=14d&limit=400'),api('/v1/deviations?limit=500')]);saveCache('anomalies',{eps,devs})}catch(e){eps=cache?.data?.eps||[];devs=cache?.data?.devs||[]}
app.innerHTML=failSoftBlock(cache)+`<div class='card'><h2>Vurderinger fra systemet</h2><div class='muted'>Denne siden viser vurderinger og resonnement, også når noe ikke blir et varsel.</div></div><div id='list'></div>`;
const list=document.getElementById('list');
list.innerHTML=eps.map(a=>{const room=a.room||'Ukjent rom';const score=Number(a.score_total||0);const baseline=a.baseline_ref?.expected||'Mangler sikkert sammenligningsgrunnlag';const observed=(a.reasons||[]).map(r=>r.reason||r.msg).filter(Boolean).slice(0,2).join('; ')||'Ingen ekstra detaljer';
const match=devs.find(d=>(d.evidence?.room===room||d.evidence?.room_id===room||room==='Ukjent rom')&& (d.window?.since?new Date(d.window.since).getTime()<=new Date(a.start_ts).getTime():true));
const alert=match? 'Ja' : (score>0.7?'Ikke ennå':'Nei');
const conf=score>=0.7?'Høy':score>=0.45?'Middels':'Lav';
const eUrl=`./events.html?room=${encodeURIComponent(room)}&since=${encodeURIComponent(a.start_ts||'')}`;
return `<div class='card'><h2>${esc(room)} · ${a.level==='RED'?'Høy oppmerksomhet':'Rolig vurdering'}</h2><ol><li>Hva la systemet merke til? Score ${score.toFixed(2)} med nivå ${a.level}.</li><li>Hva er vanlig? ${esc(String(baseline))}</li><li>Hva ble sett denne gangen? ${esc(observed)}</li><li>Hvor stor er forskjellen? ${diffLabel(score)}</li><li>Hvor sikker er vurderingen? ${conf}</li><li>Ble dette et varsel? ${alert}</li></ol><div class='row'><a href='${eUrl}'>Åpne relevante hendelser</a> ${match?`<a href='./alarms.html'>Åpne tilhørende varsel</a>`:''}</div>${devDetails(a)}</div>`}).join('')||'<div class="card muted">Ingen mulige avvik i valgt periode.</div>';
})();
</script></body></html>
