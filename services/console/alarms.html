<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Varsler</title>
  <link rel="stylesheet" href="./console_shared.css" />
</head>
<body>
  <div class="wrap">
    <div id="shell"></div>
    <div id="app"></div>
  </div>
  <script src="./console_shared.js"></script>
  <script>
    pageShell('alarms.html', 'Varsler');
    const app = document.getElementById('app');

    const statusMap = { OPEN: 'Ny', ACK: 'Sett', CLOSED: 'Ferdig' };
    const severityMap = { HIGH: 'Viktig', MEDIUM: 'Følg med', LOW: 'Lav' };
    const VIEW_ACTIVE = 'active';
    const VIEW_HISTORY = 'history';
    const sortLabels = {
      last_seen_desc: 'Sist sett (nyeste først)',
      last_seen_asc: 'Sist sett (eldste først)',
      status_asc: 'Status (A–Å)',
      title_asc: 'Tittel (A–Å)',
    };

    function confidence(dev) {
      const c = Number(dev.evidence?.confidence ?? dev.evidence?.score ?? 0);
      if (c >= 0.75) return 'Høy sikkerhet';
      if (c >= 0.45) return 'Middels sikkerhet';
      return 'Lav sikkerhet';
    }



    function truthText(t) {
      if (!t || t === 'FULLY_EVALUATED') return 'Full vurdering';
      if (t === 'NOT_EVALUATED') return 'Ikke vurdert: mangler nok historikk';
      if (t === 'WEAK_BASIS') return 'Datagrunnlaget er for svakt til full vurdering';
      if (t === 'DEFAULT_PROFILE') return 'Bruker standard nattvindu, ikke personlig boligprofil';
      return t;
    }

    function eventsLink(window, room) {
      const q = new URLSearchParams();
      if (room && room !== 'Ukjent rom') q.set('room', room);
      if (window?.since) q.set('since', window.since);
      if (window?.until) q.set('until', window.until);
      return './events.html?' + q.toString();
    }

    async function patchStatus(id, status) {
      await api('/v1/deviations/' + id, { method: 'PATCH', body: JSON.stringify({ status }) });
      location.reload();
    }

    window.patchStatus = patchStatus;

    function statusRank(status) {
      return { OPEN: 0, ACK: 1, CLOSED: 2 }[status] ?? 9;
    }

    function sortedDeviations(rows, sortKey) {
      const data = [...rows];
      data.sort((a, b) => {
        if (sortKey === 'status_asc') {
          return statusRank(a.status) - statusRank(b.status);
        }
        if (sortKey === 'title_asc') {
          return String(a.title || '').localeCompare(String(b.title || ''), 'no');
        }
        if (sortKey === 'last_seen_asc') {
          return Date.parse(a.last_seen_at || a.timestamp || 0) - Date.parse(b.last_seen_at || b.timestamp || 0);
        }
        return Date.parse(b.last_seen_at || b.timestamp || 0) - Date.parse(a.last_seen_at || a.timestamp || 0);
      });
      return data;
    }

    function filterByView(rows, view) {
      if (view === VIEW_HISTORY) return rows.filter((d) => d.status === 'CLOSED');
      return rows.filter((d) => d.status === 'OPEN' || d.status === 'ACK');
    }

    (async () => {
      const cache = loadCache('alarms');
      const [devRes, packRes, truthRes] = await Promise.all([
        apiTry('/v1/deviations?limit=500'),
        apiTry('/rules/pilot-pack'),
        apiTry('/rules/evaluation-truth'),
      ]);

      const devs = devRes.ok ? devRes.data : (cache?.data?.devs || []);
      const pack = packRes.ok ? packRes.data : (cache?.data?.pack || []);
      const truth = truthRes.ok ? truthRes.data : (cache?.data?.truth || { rules: [] });
      if (devRes.ok || packRes.ok || truthRes.ok) saveCache('alarms', { devs, pack, truth });

      const fallback = ['R-001', 'R-002', 'R-003', 'R-004', 'R-005', 'R-006', 'R-007', 'R-008', 'R-009', 'R-010'];
      const rules = (Array.isArray(pack) ? pack : []).map((r) => r.rule_id || r.id).filter(Boolean);
      const allRules = rules.length ? rules : fallback;
      const byRule = {};
      devs.forEach((d) => { byRule[d.rule_id] = byRule[d.rule_id] || []; byRule[d.rule_id].push(d); });

      app.innerHTML = `
        ${failSoftBlock(cache)}

        <div class="card">
          <h2>Pilotregelpakke</h2>
          <div class="row">
            ${allRules.map((r) => `<span class="chip ${byRule[r]?.length ? 'ok' : 'warn'}">${r}: ${byRule[r]?.length ? `${byRule[r].length} registrert` : 'ingen funn nå'}</span>`).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Regel-evaluering (sannhet)</h2>
          <div class="small muted">Viser hvorfor regler eventuelt ikke er fullt vurdert.</div>
          <table>
            <thead><tr><th>Regel</th><th>Evalueringsgrunnlag</th><th>Detaljer</th></tr></thead>
            <tbody>
              ${(truth.rules || []).map((r) => `<tr>
                <td>${esc(r.rule_id)}</td>
                <td>${esc(truthText(r.evaluation_truth))}</td>
                <td class="small muted">${esc(r.basis_summary || (r.gating_reason || 'Ingen begrensning'))}</td>
              </tr>`).join('') || '<tr><td colspan="3" class="muted">Ingen evalueringsstatus tilgjengelig.</td></tr>'}
            </tbody>
          </table>
        </div>

        <div class="card">
          <div class="row" style="justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px;">
            <div class="row" style="gap:8px;">
              <button id="btnActive" class="btn">Aktiv arbeidsliste (OPEN + ACK)</button>
              <button id="btnHistory" class="btn secondary">Historikk (CLOSED)</button>
            </div>
            <label class="small muted" for="sortSelect">Sortering</label>
            <select id="sortSelect" style="max-width:260px;">
              ${Object.entries(sortLabels).map(([key, label]) => `<option value="${key}">${label}</option>`).join('')}
            </select>
          </div>

          <table>
            <thead>
              <tr>
                <th>Tittel</th>
                <th>Rom</th>
                <th>Oppdaget</th>
                <th>Sist sett</th>
                <th>Alvorlighet</th>
                <th>Sikkerhet</th>
                <th>Status</th>
                <th>Handlinger</th>
              </tr>
            </thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
      `;

      const tb = document.getElementById('tb');
      const btnActive = document.getElementById('btnActive');
      const btnHistory = document.getElementById('btnHistory');
      const sortSelect = document.getElementById('sortSelect');

      let currentView = VIEW_ACTIVE;

      function renderRows(rows) {
        tb.innerHTML = rows.map((d) => {
        const ev = d.evidence || {};
        const room = ev.room || ev.room_id || 'Ukjent rom';
        const normal = ev.baseline ?? ev.expected ?? 'Mangler sammenlignbar historikk for denne perioden.';
        const observed = ev.observed ?? ev.current ?? 'Mangler observasjon i grunnlaget.';
        const diff = ev.delta ?? ev.diff ?? 'Forskjellen kan ikke tallfestes sikkert ennå.';
        const certainty = confidence(d);
        const evalTruth = ev.evaluation_truth || 'FULLY_EVALUATED';
        const truthMsg = truthText(evalTruth);

        const uncertaintyText = certainty !== 'Høy sikkerhet'
          ? (ev.uncertainty_reason || 'Vi mangler enten sammenlignbar historikk, stabil romkobling eller bedre datakvalitet. Mer data kan hjelpe, men tidshorisonten varierer per varseltype.')
          : '';

        return `
          <tr>
            <td>
              <b>${esc(d.title || 'Varsel')}</b>
              <div class="small muted">Hva bør du gjøre? Se hendelser i samme tidsrom og bekreft situasjonen i rommet.</div>
              <details style="margin-top:8px">
                <summary>Se forklaring</summary>
                <div class="qa"><div class="q">1. Hva reagerer vi på?</div><div class="a">${esc(d.title || 'Mønsteravvik')}</div></div>
                <div class="qa"><div class="q">2. Hvorfor fikk du dette varselet?</div><div class="a">${esc(d.explanation || 'Vi har oppdaget avvik fra det som er vanlig i samme tidsrom.')}</div></div>
                <div class="qa"><div class="q">3. Hva er vanlig?</div><div class="a">${esc(String(normal))}</div></div>
                <div class="qa"><div class="q">4. Hva ble sett nå?</div><div class="a">${esc(String(observed))}</div></div>
                <div class="qa"><div class="q">5. Hvor stor er forskjellen?</div><div class="a">${esc(String(diff))}</div></div>
                <div class="qa"><div class="q">6. Hvor sikre er vi?</div><div class="a">${certainty}</div></div>
                <div class="qa"><div class="q">6b. Evalueringsgrunnlag</div><div class="a">${esc(truthMsg)}</div></div>
                <div class="qa"><div class="q">7. Hvor alvorlig virker dette?</div><div class="a">${severityMap[d.severity] || 'Følg med'}</div></div>
                <div class="qa"><div class="q">8. Hva bør du gjøre nå?</div><div class="a">Se hendelser i samme tidsrom, sjekk rommet og marker deretter som sett eller ferdig.</div></div>
                ${uncertaintyText ? `<div class="notice warn small">Usikkerhet: ${esc(uncertaintyText)}</div>` : ''}
                ${devDetails(d)}
              </details>
            </td>
            <td>${esc(room)}</td>
            <td>${fmtNo(d.started_at || d.timestamp)}</td>
            <td>${fmtNo(d.last_seen_at)}</td>
            <td>${severityMap[d.severity] || 'Følg med'}</td>
            <td>${certainty}</td>
            <td>${statusMap[d.status] || d.status}</td>
            <td>
              <div class="actions">
                <button class="btn secondary" onclick="patchStatus(${d.deviation_id}, 'ACK')">Marker som sett</button>
                <button class="btn secondary" onclick="patchStatus(${d.deviation_id}, 'CLOSED')">Marker som ferdig</button>
                <a href="${eventsLink(d.window, room)}">Se hendelser i samme tidsrom</a>
              </div>
            </td>
          </tr>
        `;
        }).join('') || `<tr><td colspan="8" class="muted">Ingen varsler i ${currentView === VIEW_ACTIVE ? 'aktiv arbeidsliste' : 'historikk'}.</td></tr>`;
      }

      function render() {
        btnActive.className = currentView === VIEW_ACTIVE ? 'btn' : 'btn secondary';
        btnHistory.className = currentView === VIEW_HISTORY ? 'btn' : 'btn secondary';
        const visible = filterByView(devs, currentView);
        renderRows(sortedDeviations(visible, sortSelect.value));
      }

      btnActive.addEventListener('click', () => {
        currentView = VIEW_ACTIVE;
        render();
      });
      btnHistory.addEventListener('click', () => {
        currentView = VIEW_HISTORY;
        render();
      });
      sortSelect.addEventListener('change', render);

      render();
    })();
  </script>
</body>
</html>
