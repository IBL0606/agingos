<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oversikt</title>
  <link rel="stylesheet" href="./console_shared.css" />
</head>
<body>
  <div class="wrap">
    <div id="shell"></div>
    <div id="app"></div>
  </div>
  <script src="./console_shared.js"></script>
  <script>
    pageShell('index.html', 'Oversikt');
    const app = document.getElementById('app');

    function itemBlock(item) {
      return `<div style="margin-bottom:10px">
        <div><b>${esc(item.component || 'ukjent')}</b> · <span class="chip">${esc(item.status || 'UNKNOWN')}</span></div>
        <div><b>Hva er galt:</b> ${esc(item.what_is_wrong || '—')}</div>
        <div><b>Hva betyr det:</b> ${esc(item.what_it_means || '—')}</div>
        <div><b>Hva bør operatør gjøre:</b> ${esc(item.operator_next_step || '—')}</div>
      </div>`;
    }

    (async () => {
      const cache = loadCache('oversikt');
      let data = null;

      const res = await apiTry('/health/detail');
      if (res.ok) {
        data = res.data;
        saveCache('oversikt', data);
      } else {
        data = cache?.data || null;
      }

      if (!data) {
        app.innerHTML = failSoftBlock(cache) + `<div class="card">Ingen helsedata tilgjengelig ennå.</div>`;
        return;
      }

      const c = data.components || {};
      const checks = [
        ['System', statusNorwegian(data.overall_status)],
        ['Nye hendelser kommer inn', statusNorwegian(c.ingest?.status)],
        ['Analyse fungerer', (data.weekly_truth_snapshot?.analysis_running?.status || 'UNKNOWN')],
        ['Varsler fungerer', statusNorwegian(c.scheduler?.status)],
        ['Historikkgrunnlag er klart', (data.weekly_truth_snapshot?.history_basis_ready?.status || 'UNKNOWN')],
      ];

      const overall = statusNorwegian(data.overall_status);
      const weeklyBasis = data.weekly_truth_snapshot?.basis;
      const action = overall === 'Bra'
        ? 'Følg normal drift og se gjennom nye varsler ved behov.'
        : 'Sjekk konkrete årsaker under “Hva er galt, hva betyr det, og hva bør du gjøre?”.';

      const explanations = Array.isArray(data.operator_explanations) ? data.operator_explanations : [];

      app.innerHTML = `
        ${failSoftBlock(cache)}
        <div class="card">
          <h2>Slik står det til</h2>
          <span class="chip ${overall === 'Bra' ? 'ok' : overall === 'Følg med' ? 'warn' : 'bad'}">${overall}</span>
          <div class="muted" style="margin-top:8px">Slik står det til akkurat nå.</div>
        </div>

        <div class="card">
          <h2>Helsesjekk</h2>
          ${checks.map(([k, v]) => `<div class="row"><b style="min-width:250px">${k}</b><span class="chip">${esc(v)}</span></div>`).join('')}
        </div>

        <div class="card">
          <h2>Hva er galt, hva betyr det, og hva bør du gjøre?</h2>
          ${explanations.length ? explanations.map(itemBlock).join('') : '<div>Ingen konkrete avvik meldt.</div>'}
        </div>

        <div class="card">
          <h2>Historikkgrunnlag nå</h2>
          <p><b>${esc(weeklyBasis?.message || 'Ingen grunnlagsvurdering tilgjengelig.')}</b></p>
          ${(weeklyBasis?.deficits || []).length
            ? `<ul>${weeklyBasis.deficits.map((d) => `<li>${esc(d.key)}: har ${esc(String(d.have ?? '—'))}, trenger ${esc(String(d.need ?? '—'))}. ${esc(d.detail || '')}</li>`).join('')}</ul>`
            : '<p class="muted">Ingen registrerte mangler i grunnlaget.</p>'}
        </div>

        <div class="card">
          <h2>Hva bør jeg gjøre nå?</h2>
          <p>${action}</p>
          <button class="btn" onclick="location.reload()">Oppdater</button>
        </div>

        <div class="card">
          ${devDetails(data)}
        </div>
      `;
    })();
  </script>
</body>
</html>
