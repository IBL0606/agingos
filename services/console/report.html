<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ukessammendrag</title>
  <link rel="stylesheet" href="./console_shared.css" />
</head>
<body>
  <div class="wrap">
    <div id="shell"></div>
    <div id="app"></div>
  </div>
  <script src="./console_shared.js"></script>
  <script>
    pageShell('report.html', 'Ukessammendrag');
    const app = document.getElementById('app');

    function roomOf(e) {
      const p = e.payload || {};
      return p.room_id || p.room || p.area || 'Ukjent rom';
    }

    async function loadData(cache) {
      const result = {
        ev: cache?.data?.ev || [],
        an: cache?.data?.an || [],
        dv: cache?.data?.dv || [],
        pp: cache?.data?.pp || [],
        bs: cache?.data?.bs || {},
      };

      const [ev, an, dv, pp, bs] = await Promise.all([
        apiTry('/v1/events?limit=5000&stream_id=prod'),
        apiTry('/v1/anomalies?last=7d&limit=500'),
        apiTry('/v1/deviations?limit=500'),
        apiTry('/proposals?limit=300'),
        apiTry('/baseline/status'),
      ]);

      if (ev.ok) result.ev = ev.data;
      if (an.ok) result.an = an.data;
      if (dv.ok) result.dv = dv.data;
      if (pp.ok) result.pp = pp.data;
      if (bs.ok) result.bs = bs.data;

      if (ev.ok || an.ok || dv.ok || pp.ok || bs.ok) {
        saveCache('report', result);
      }
      return result;
    }

    (async () => {
      const cache = loadCache('report');
      const data = await loadData(cache);

      const since = Date.now() - 7 * 86400000;
      const weekEvents = (data.ev || []).filter((e) => new Date(e.timestamp).getTime() >= since);

      const roomCounts = {};
      const dayCounts = {};
      weekEvents.forEach((e) => {
        const r = roomOf(e);
        roomCounts[r] = (roomCounts[r] || 0) + 1;

        const d = new Date(e.timestamp);
        if (!Number.isNaN(d.getTime())) {
          const day = d.toISOString().slice(0, 10);
          dayCounts[day] = (dayCounts[day] || 0) + 1;
        }
      });

      const roomSorted = Object.entries(roomCounts).sort((a, b) => b[1] - a[1]);
      const daySorted = Object.entries(dayCounts).sort((a, b) => b[1] - a[1]);

      const trust = data.bs?.baseline_ready || data.bs?.status === 'OK'
        ? 'Godt grunnlag i flere rom.'
        : 'Grunnlaget er fortsatt svakt i ett eller flere rom.';

      app.innerHTML = `
        ${failSoftBlock(cache)}

        <div class="card">
          <h2>Slik har uken vært</h2>
          <p>
            Vi har registrert <b>${weekEvents.length}</b> hendelser siste 7 dager.
            ${data.dv.length ? `Det har vært <b>${data.dv.length}</b> varsler som bør følges opp.` : 'Ingen tydelige varsler denne uken.'}
          </p>
        </div>

        <div class="grid2">
          <div class="card">
            <h2>Aktivitet denne uken</h2>
            <div>Mest aktivitet: ${roomSorted[0]?.[0] || '—'}</div>
            <div>Minst aktivitet: ${(roomSorted.slice(-1)[0] || [])[0] || '—'}</div>
            <div>Rom uten aktivitet: Ikke beregnet uten komplett romkatalog.</div>
            <div>Mest aktiv dag: ${daySorted[0]?.[0] || '—'}</div>
            <div>Roligste dag: ${(daySorted.slice(-1)[0] || [])[0] || '—'}</div>
            <p class="small muted">Forklaring: Aktivitet teller antall registrerte hendelser per rom og dag.</p>
          </div>

          <div class="card">
            <h2>Viktigste varsler</h2>
            ${(data.dv || []).slice(0, 5).map((d) => `<div><b>${esc(d.title || 'Varsel')}</b> · ${fmtNo(d.last_seen_at)}</div>`).join('') || 'Ingen varsler registrert.'}
            <h3 style="margin-top:12px">Mulige avvik vi fulgte med på</h3>
            ${(data.an || []).slice(0, 5).map((a) => `<div>${esc(a.room || 'Ukjent rom')} · observert avvik</div>`).join('') || 'Ingen mulige avvik registrert.'}
          </div>
        </div>

        <div class="card">
          <h2>Hva ser ut til å være vanlig?</h2>
          <p>
            ${roomSorted.length
              ? `Rommene ${roomSorted.slice(0, 3).map((x) => x[0]).join(', ')} har hatt jevnest aktivitet denne uken.`
              : 'Vi har ikke nok hendelser til å beskrive tydelige mønstre ennå.'}
          </p>
        </div>

        <div class="card">
          <h2>Hvor godt grunnlag har vi nå?</h2>
          <p>${trust}</p>
          <p class="muted">Mangler vi sammenlignbar historikk, blir vurderingene mer usikre.</p>
        </div>

        <div class="card">
          <h2>Hva bør følges opp neste uke?</h2>
          <ul>
            <li>Bekreft rom med lav aktivitet mot faktisk drift.</li>
            <li>Gå gjennom varsler med høy alvorlighet først.</li>
            <li>Vurder åpne anbefalinger før nye endringer.</li>
          </ul>
        </div>

        <div class="card">${devDetails(data)}</div>
      `;
    })();
  </script>
</body>
</html>
