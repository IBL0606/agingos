<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ukessammendrag</title><link rel="stylesheet" href="./console_shared.css"></head><body><div class="wrap"><div id="shell"></div><div id="app"></div></div><script src="./console_shared.js"></script><script>
pageShell('report.html','Ukessammendrag');const app=document.getElementById('app');
function roomOf(e){const p=e.payload||{};return p.room_id||p.room||p.area||'Ukjent rom'}
(async()=>{const cache=loadCache('report');let ev=[],an=[],dv=[],pp=[],bs={};try{[ev,an,dv,pp,bs]=await Promise.all([api('/v1/events?limit=2000&stream_id=prod'),api('/v1/anomalies?last=7d&limit=300'),api('/v1/deviations?limit=300'),api('/proposals?limit=200'),api('/baseline/status')]);saveCache('report',{ev,an,dv,pp,bs})}catch(e){const c=cache?.data||{};ev=c.ev||[];an=c.an||[];dv=c.dv||[];pp=c.pp||[];bs=c.bs||{}}
const since=Date.now()-7*86400000;ev=ev.filter(x=>new Date(x.timestamp).getTime()>=since);const rc={};const dc={};ev.forEach(e=>{const r=roomOf(e);rc[r]=(rc[r]||0)+1;const d=new Date(e.timestamp).toISOString().slice(0,10);dc[d]=(dc[d]||0)+1});const rSorted=Object.entries(rc).sort((a,b)=>b[1]-a[1]);const dSorted=Object.entries(dc).sort((a,b)=>b[1]-a[1]);
const trust=bs?.baseline_ready||bs?.status==='OK'?'Godt grunnlag i flere rom':'Svakt grunnlag i ett eller flere rom';
app.innerHTML=failSoftBlock(cache)+`<div class='card'><h2>Slik har uken vært</h2><p>Denne uken ser vi ${ev.length} hendelser totalt. ${dv.length?`Det har vært ${dv.length} varsler som bør følges opp.`:'Ingen tydelige varsler denne uken.'}</p></div>
<div class='grid2'><div class='card'><h2>Aktivitet denne uken</h2><div>Mest aktivitet: ${rSorted[0]?.[0]||'—'}</div><div>Minst aktivitet: ${(rSorted.slice(-1)[0]||[])[0]||'—'}</div><div>Rom uten aktivitet: ${Object.keys(rc).length?Object.entries(rc).filter(([,n])=>n===0).map(x=>x[0]).join(', ')||'Ingen i datagrunnlaget':'Mangler data'}</div><div>Mest aktiv dag: ${dSorted[0]?.[0]||'—'}</div><div>Roligste dag: ${(dSorted.slice(-1)[0]||[])[0]||'—'}</div><p class='small muted'>Forklaring: Aktivitet teller antall hendelser per rom og dag.</p></div>
<div class='card'><h2>Viktigste varsler</h2>${dv.slice(0,5).map(d=>`<div><b>${esc(d.title||d.rule_id)}</b> · ${fmtNo(d.last_seen_at)}</div>`).join('')||'Ingen varsler registrert.'}<h2 style='margin-top:10px'>Mulige avvik vi fulgte med på</h2>${an.slice(0,5).map(a=>`<div>${esc(a.room||'Ukjent rom')} · nivå ${a.level}</div>`).join('')||'Ingen mulige avvik.'}</div></div>
<div class='card'><h2>Hva ser ut til å være vanlig?</h2><p>Rommene ${rSorted.slice(0,3).map(x=>x[0]).join(', ')||'uten tydelige mønstre ennå'} har hatt jevnest aktivitet. Mønstrene blir sikrere når vi får flere uker med sammenlignbar historikk.</p></div>
<div class='card'><h2>Hvor godt grunnlag har vi nå?</h2><p>${trust}. ${bs?.reason||''}</p></div>
<div class='card'><h2>Hva bør følges opp neste uke?</h2><ul><li>Bekreft rom med lav aktivitet mot faktisk drift.</li><li>Gå gjennom varsler med høy alvorlighet først.</li><li>Vurder åpne anbefalinger før nye endringer.</li></ul></div>
<div class='card'>${devDetails({events:ev.slice(0,20),anomalies:an.slice(0,10),deviations:dv.slice(0,10),proposals:pp.slice(0,10),baseline:bs})}</div>`;
})();
</script></body></html>
