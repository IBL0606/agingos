<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ukessammendrag</title>
  <link rel="stylesheet" href="./console_shared.css" />
</head>
<body>
  <div class="wrap">
    <div id="shell"></div>
    <div id="app"></div>
  </div>
  <script src="./console_shared.js"></script>
  <script>
    pageShell('report.html', 'Ukessammendrag');
    const app = document.getElementById('app');

    async function loadData(cache) {
      const result = cache?.data || null;
      const weekly = await apiTry(`/v1/reports/weekly?stream_id=${encodeURIComponent(streamId())}`);
      if (weekly.ok) {
        saveCache('report', weekly.data);
        return weekly.data;
      }
      return result;
    }

    function deficitLine(d) {
      const missing = Array.isArray(d?.missing_rooms) && d.missing_rooms.length
        ? ` Mangler rom: ${d.missing_rooms.join(', ')}.`
        : '';
      return `<li><b>${esc(d?.key || 'ukjent')}</b>: har ${esc(String(d?.have ?? '—'))}, trenger ${esc(String(d?.need ?? '—'))}. ${esc(d?.detail || '')}${esc(missing)}</li>`;
    }

    async function downloadTruthExport() {
      const res = await fetch(`${nbase()}/v1/reports/weekly/export.json?stream_id=${encodeURIComponent(streamId())}`, {
        headers: key() ? { 'X-API-Key': key() } : {},
      });
      if (!res.ok) {
        alert(`Kunne ikke laste ned eksport: HTTP ${res.status}`);
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().replace(/[:.]/g, '-');
      a.href = url;
      a.download = `agingos_weekly_truth_${ts}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    (async () => {
      const cache = loadCache('report');
      const data = await loadData(cache);

      if (!data) {
        app.innerHTML = failSoftBlock(cache) + `<div class="card">Ingen ukesannhet tilgjengelig ennå.</div>`;
        return;
      }

      const summary = data.summary || {};
      const basis = data.basis || {};
      const deficits = Array.isArray(basis.deficits) ? basis.deficits : [];
      const weak = (basis.status || '').toUpperCase() !== 'READY';

      app.innerHTML = `
        ${failSoftBlock(cache)}

        <div class="card">
          <h2>Slik har uken vært</h2>
          <p>
            Vi har registrert <b>${summary.events_7d || 0}</b> hendelser siste 7 dager.
            ${summary.deviations_open ? `Det er <b>${summary.deviations_open}</b> åpne/kvitterte varsler nå.` : 'Ingen åpne varsler akkurat nå.'}
          </p>
          <div class="small muted">Kilde: serveraggregert sannhet fra /v1/reports/weekly for valgt scope/stream.</div>
        </div>

        <div class="grid2">
          <div class="card">
            <h2>Analyse og historikkgrunnlag</h2>
            <div class="row"><b style="min-width:260px">Analyse fungerer</b><span class="chip">${esc(data.analysis_running?.status || 'UNKNOWN')}</span></div>
            <div class="small muted">Bevis: ${(data.analysis_running?.evidence || []).map(esc).join(' · ') || '—'}</div>
            <div class="row" style="margin-top:8px"><b style="min-width:260px">Historikkgrunnlag er klart</b><span class="chip">${esc(data.history_basis_ready?.status || 'UNKNOWN')}</span></div>
            <div class="small muted">Bevis: ${(data.history_basis_ready?.evidence || []).map(esc).join(' · ') || '—'}</div>
          </div>

          <div class="card">
            <h2>Oppsummerte kilder</h2>
            <div>Mulige avvik siste 7d: <b>${summary.anomalies_7d || 0}</b></div>
            <div>Varsler sett siste 7d: <b>${summary.deviations_seen_7d || 0}</b></div>
            <div>Forslag oppdatert siste 7d: <b>${summary.proposals_updated_7d || 0}</b></div>
            <button class="btn" id="downloadExportBtn" style="margin-top:12px">Last ned sannhets-eksport (JSON)</button>
          </div>
        </div>

        <div class="card">
          <h2>Hvor godt grunnlag har vi nå?</h2>
          <p><b>${esc(basis.message || 'Ingen vurdering tilgjengelig.')}</b></p>
          ${weak
            ? `<p class="muted">Dette er konkret hva som mangler før grunnlaget regnes som klart:</p><ul>${deficits.map(deficitLine).join('')}</ul>`
            : '<p class="muted">Minimumskravene er oppfylt for ukesammendrag.</p>'}
        </div>

        <div class="card">${devDetails(data)}</div>
      `;

      const btn = document.getElementById('downloadExportBtn');
      if (btn) btn.onclick = downloadTruthExport;
    })();
  </script>
</body>
</html>
