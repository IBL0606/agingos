<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anbefalinger</title><link rel="stylesheet" href="./console_shared.css"></head><body><div class="wrap"><div id="shell"></div><div id="app"></div></div><script src="./console_shared.js"></script><script>
pageShell('proposals.html','Anbefalinger');const app=document.getElementById('app');
const sMap={NEW:'Ny',TESTING:'Under vurdering',ACTIVE:'Godkjent for test',REJECTED:'Avvist'};
function utility(p){const pr=Number(p.priority||50);return pr>=70?'Høy nytte':pr>=40?'Middels nytte':'Lav nytte'}
async function act(id,a){await api(`/proposals/${id}/${a}`,{method:'POST',body:JSON.stringify({note:'console'})});location.reload()}
(async()=>{const cache=loadCache('proposals');let ps=[];try{ps=await api('/proposals?limit=500');saveCache('proposals',ps)}catch(e){ps=cache?.data||[]}
app.innerHTML=failSoftBlock(cache)+`<div class='card'><h2>Forslag til testing og justering</h2><label><input type='checkbox' id='showClosed'> Vis også avsluttede/avviste</label></div><div id='list'></div>`;
const list=document.getElementById('list');function render(){const show=document.getElementById('showClosed').checked;let rows=ps.filter(p=>show || !['REJECTED'].includes(p.state));
list.innerHTML=rows.map(p=>{const why=Array.isArray(p.why)?p.why.join('; '):JSON.stringify(p.why||'');const conf=(p.evidence&&p.evidence.confidence)?Math.round(p.evidence.confidence*100)+'%':'Ukjent';const room=p.room_id||p.evidence?.room||'Ukjent rom';const age=Math.floor((Date.now()-new Date(p.updated_at||Date.now()).getTime())/86400000);
return `<div class='card'><h2>${esc(p.proposal_type||'Anbefaling')} · ${esc(room)}</h2><ol><li>Hva anbefales? ${esc(p.action_target||'Juster regel/oppfølging')}</li><li>Hvorfor anbefales dette? ${esc(why||'Basert på mønster i hendelser')}</li><li>Hva bygger dette på? Hendelser, mulige avvik og varsler i samme område.</li><li>Hvor nyttig virker dette? ${utility(p)}</li><li>Hvor sikker er anbefalingen? ${esc(conf)}</li><li>Hvor ny er anbefalingen? Oppdatert ${age} dager siden.</li><li>Status: ${sMap[p.state]||p.state}</li></ol><div class='row'><button class='btn secondary' onclick='act(${p.proposal_id},"test")'>Under vurdering</button><button class='btn secondary' onclick='act(${p.proposal_id},"activate")'>Godkjenn for test</button><button class='btn secondary' onclick='act(${p.proposal_id},"reject")'>Avvis</button><a href='./events.html?room=${encodeURIComponent(room)}'>Se hendelser</a><a href='./anomalies.html'>Se mulige avvik</a><a href='./alarms.html'>Se varsler</a></div>${devDetails(p)}</div>`}).join('')||'<div class="card muted">Ingen anbefalinger tilgjengelig.</div>'}
render();document.getElementById('showClosed').onchange=render;
})();
</script></body></html>
