# Devbox-only overlay: bind host ports to localhost to avoid LAN exposure.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml ps

services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
  console:
    ports:
      - "127.0.0.1:8080:80"
  db:
    ports:
      - "127.0.0.1:5432:5432"
  ai-bot:
    ports:
      - "127.0.0.1:8010:8010"
