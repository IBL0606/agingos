name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint/format (fail fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff format (check)
        run: make fmt-check

      - name: Ruff check
        run: make lint

  smoke_and_scenario:
    name: Smoke + scenario (docker compose)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Write .env for CI (from GitHub Secrets)
        shell: bash
        env:
          AGINGOS_API_KEYS: ${{ secrets.AGINGOS_API_KEYS }}
          AGINGOS_API_KEY: ${{ secrets.AGINGOS_API_KEY }}
        run: |
          set -euo pipefail
          cat > .env <<EOF
          AGINGOS_AUTH_MODE=api_key
          AGINGOS_API_KEYS=${AGINGOS_API_KEYS}
          AGINGOS_API_KEY=${AGINGOS_API_KEY}
          EOF
          chmod 600 .env

      - name: Verify secrets are non-empty (length only)
        shell: bash
        env:
          AGINGOS_API_KEYS: ${{ secrets.AGINGOS_API_KEYS }}
          AGINGOS_API_KEY: ${{ secrets.AGINGOS_API_KEY }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          for k in ["AGINGOS_API_KEYS","AGINGOS_API_KEY"]:
              v = os.environ.get(k, "")
              print(f"{k}_len={len(v)}")
          PY

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: make up
        run: make up

      - name: make smoke
        env:
          AGINGOS_API_KEY: ${{ secrets.AGINGOS_API_KEY }}
        run: make smoke

      - name: make scenario
        env:
          AGINGOS_API_KEY: ${{ secrets.AGINGOS_API_KEY }}
        run: make scenario
